<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متابعة المديونيات — فرع الوفاء</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d1117;--surface:#161b22;--surface2:#1c2330;--border:#30363d;
    --accent:#00b4d8;--accent2:#0077b6;--gold:#f4a261;
    --green:#2ecc71;--red:#e74c3c;--yellow:#f39c12;
    --text:#e6edf3;--muted:#8b949e;--radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  header{background:linear-gradient(135deg,var(--accent2),#023e8a);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(0,180,216,.3);position:sticky;top:0;z-index:100;}
  .header-title{font-size:1.3rem;font-weight:900;}
  .header-date{font-size:.8rem;color:rgba(255,255,255,.7);}

  /* SEARCH */
  .search-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;position:sticky;top:61px;z-index:98;}
  .search-wrap{max-width:700px;margin:0 auto;position:relative;}
  .search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:9px 16px 9px 40px;color:var(--text);font-family:'Cairo',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;direction:rtl;}
  .search-wrap input:focus{border-color:var(--accent);}
  .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);}
  #search-results{position:absolute;top:calc(100% + 4px);right:0;left:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;z-index:200;max-height:300px;overflow-y:auto;display:none;box-shadow:0 8px 30px rgba(0,0,0,.5);}
  .search-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;transition:background .15s;}
  .search-item:last-child{border-bottom:none;}
  .search-item:hover{background:var(--surface2);}
  .search-item-name{font-weight:700;font-size:.9rem;}
  .search-item-meta{font-size:.78rem;color:var(--muted);}

  /* TABS */
  .tabs-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:112px;z-index:97;overflow-x:auto;}
  .tab-btn{flex:1;min-width:80px;padding:13px 6px;background:none;border:none;color:var(--muted);font-family:'Cairo',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;position:relative;transition:color .2s;display:flex;align-items:center;justify-content:center;gap:4px;}
  .tab-btn.active{color:var(--accent);}
  .tab-btn.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--accent);border-radius:3px 3px 0 0;}
  .badge{background:var(--red);color:#fff;border-radius:999px;font-size:.68rem;padding:1px 6px;font-weight:700;min-width:18px;text-align:center;display:none;}
  .badge.show{display:inline-block;}
  .badge-orange{background:var(--yellow)!important;}

  /* PANELS */
  .panel{display:none;padding:20px;max-width:700px;margin:0 auto;}
  .panel.active{display:block;}

  /* CARD */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
  .card-title{font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

  /* FORM */
  .form-group{margin-bottom:14px;}
  label{display:block;font-size:.82rem;color:var(--muted);margin-bottom:6px;font-weight:600;}
  input[type=text],input[type=date],input[type=number],select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'Cairo',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s;direction:rtl;}
  input[type=text]:focus,input[type=date]:focus,input[type=number]:focus,select:focus{border-color:var(--accent);}
  input[type=number]{direction:ltr;text-align:right;}

  /* BUTTONS */
  .btn{width:100%;padding:13px;border:none;border-radius:8px;font-family:'Cairo',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
  .btn-gold{background:linear-gradient(135deg,var(--gold),#e76f51);color:#fff;}
  .btn-green{background:linear-gradient(135deg,var(--green),#27ae60);color:#fff;}
  .btn-sm{width:auto;padding:7px 14px;font-size:.82rem;border-radius:6px;}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
  .btn-outline:hover{border-color:var(--accent);color:var(--accent);}
  .btn-danger{background:var(--red);color:#fff;}

  /* TABLE */
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:.85rem;}
  th{background:var(--surface2);padding:10px 12px;text-align:right;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border);white-space:nowrap;}
  td{padding:10px 12px;border-bottom:1px solid rgba(48,54,61,.5);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,.02);}

  /* STATUS */
  .status{display:inline-block;padding:3px 10px;border-radius:999px;font-size:.75rem;font-weight:700;white-space:nowrap;}
  .status-paid{background:rgba(46,204,113,.15);color:var(--green);border:1px solid rgba(46,204,113,.3);}
  .status-partial{background:rgba(243,156,18,.15);color:var(--yellow);border:1px solid rgba(243,156,18,.3);}
  .status-unpaid{background:rgba(231,76,60,.15);color:var(--red);border:1px solid rgba(231,76,60,.3);}

  /* STATS */
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;cursor:pointer;transition:border-color .2s;}
  .stat-card:hover{border-color:var(--accent);}
  .stat-value{font-size:1.4rem;font-weight:900;}
  .stat-label{font-size:.72rem;color:var(--muted);margin-top:2px;}

  /* REPORT */
  .report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .today-label{font-size:.82rem;background:rgba(0,180,216,.1);border:1px solid rgba(0,180,216,.3);color:var(--accent);padding:4px 12px;border-radius:999px;}
  #report-snap{background:var(--surface);border-radius:var(--radius);padding:16px;}
  .snap-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .snap-title{font-size:1rem;font-weight:900;}
  .snap-subtitle{font-size:.78rem;color:var(--muted);}

  /* COLLECTION BALANCE */
  .client-invoices{background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:10px;}
  .client-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:.85rem;}
  .client-row:last-child{border-bottom:none;}

  /* EMPTY */
  .empty{text-align:center;padding:40px 20px;color:var(--muted);}
  .empty-icon{font-size:3rem;margin-bottom:10px;}

  /* TOAST */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 24px;border-radius:999px;font-size:.9rem;font-weight:600;z-index:9999;transition:transform .3s;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.4);}
  #toast.show{transform:translateX(-50%) translateY(0);}
  #toast.success{border-color:var(--green);color:var(--green);}
  #toast.error{border-color:var(--red);color:var(--red);}

  /* CLIENT MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:none;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:700px;margin-top:10px;}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .modal-title{font-size:1.15rem;font-weight:900;color:var(--accent);}
  .close-btn{background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;}
  .close-btn:hover{color:var(--text);}

  /* OVERDUE ALERT */
  .overdue-alert{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:.88rem;}

  /* QUICK VIEW PANEL */
  .quick-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;display:none;}
  .quick-panel.open{display:block;}
  .quick-panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .quick-panel-title{font-weight:700;font-size:.95rem;color:var(--accent);}

  /* CHECKBOX FILTER */
  .check-filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
  .check-label{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.85rem;font-weight:600;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);transition:all .2s;user-select:none;}
  .check-label:hover{border-color:var(--accent);}
  .check-label input[type=checkbox]{display:none;}
  .check-label.checked-all{border-color:var(--accent);color:var(--accent);background:rgba(0,180,216,.1);}
  .check-label.checked-unpaid{border-color:var(--red);color:var(--red);background:rgba(231,76,60,.1);}
  .check-label.checked-partial{border-color:var(--yellow);color:var(--yellow);background:rgba(243,156,18,.1);}
  .check-label.checked-paid{border-color:var(--green);color:var(--green);background:rgba(46,204,113,.1);}

  /* COLLECTION DATES in modal */
  .col-dates{font-size:.72rem;color:var(--muted);margin-top:3px;}

  /* PRINT / SNAPSHOT HEADER (visible in canvas only) */
  #client-snap-header{display:none;}

  /* POSTPONE POPUP */
  .postpone-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;display:none;align-items:center;justify-content:center;padding:20px;}
  .postpone-overlay.open{display:flex;}
  .postpone-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;width:100%;max-width:360px;box-shadow:0 12px 40px rgba(0,0,0,.5);}
  .postpone-title{font-weight:900;font-size:1rem;color:var(--gold);margin-bottom:6px;}
  .postpone-client{font-size:.82rem;color:var(--muted);margin-bottom:16px;}
  .postpone-tabs{display:flex;gap:8px;margin-bottom:14px;}
  .p-tab{flex:1;padding:8px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'Cairo',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;}
  .p-tab.active{border-color:var(--gold);color:var(--gold);background:rgba(244,162,97,.1);}
  .p-section{display:none;}.p-section.open{display:block;}

  @media(max-width:480px){
    .stats-grid{grid-template-columns:1fr 1fr;}
    header{padding:12px 16px;}
    .panel{padding:14px;}
    .tab-btn{font-size:.72rem;min-width:70px;}
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">💼 متابعة المديونيات — فرع الوفاء</div>
    <div class="header-date" id="hdr-date"></div>
  </div>
  <div style="font-size:1.6rem">🏦</div>
</header>

<!-- SEARCH -->
<div class="search-bar">
  <div class="search-wrap">
    <input type="text" id="global-search" placeholder="ابحث عن عميل بالاسم..." oninput="doSearch()" onblur="hideSearchDelay()">
    <span class="search-icon">🔍</span>
    <div id="search-results"></div>
  </div>
</div>

<!-- TABS -->
<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('invoices',this)">🧾 الفواتير</button>
  <button class="tab-btn" onclick="switchTab('collection',this)">💰 التحصيل</button>
  <button class="tab-btn" onclick="switchTab('report',this)">📋 تحصيلات اليوم <span class="badge" id="report-badge"></span></button>
  <button class="tab-btn" onclick="switchTab('all',this)">📂 الكل</button>
</div>

<!-- ══ INVOICES ══ -->
<div class="panel active" id="panel-invoices">
  <div class="card">
    <div class="card-title">➕ تسجيل فاتورة جديدة</div>
    <div class="form-group">
      <label>اسم العميل</label>
      <input type="text" id="inv-client" placeholder="أدخل اسم العميل..." list="clients-list">
      <datalist id="clients-list"></datalist>
    </div>
    <div class="form-group"><label>تاريخ الفاتورة</label><input type="date" id="inv-date"></div>
    <div class="form-group"><label>مبلغ الفاتورة (جنيه)</label><input type="number" id="inv-amount" placeholder="0.00" min="0" step="0.01"></div>
    <div class="form-group"><label>رقم الفاتورة (اختياري)</label><input type="text" id="inv-number" placeholder="مثل: INV-001"></div>
    <button class="btn btn-primary" onclick="addInvoice()">💾 حفظ الفاتورة</button>
  </div>
  <!-- Stats — clickable -->
  <div class="stats-grid" id="inv-stats"></div>
  <!-- Quick panels -->
  <div class="quick-panel" id="qp-collected">
    <div class="quick-panel-header">
      <span class="quick-panel-title">💵 تحصيلات اليوم</span>
      <button class="btn btn-sm btn-outline" onclick="closeQP()">✕</button>
    </div>
    <div id="qp-collected-body"></div>
  </div>
  <div class="quick-panel" id="qp-remaining">
    <div class="quick-panel-header">
      <span class="quick-panel-title">📋 الفواتير غير المسددة / الجزئية</span>
      <button class="btn btn-sm btn-outline" onclick="closeQP()">✕</button>
    </div>
    <div id="qp-remaining-body"></div>
  </div>
</div>

<!-- ══ COLLECTION ══ -->
<div class="panel" id="panel-collection">
  <div class="card">
    <div class="card-title">💵 تسجيل تحصيل</div>
    <div class="form-group">
      <label>اسم العميل</label>
      <select id="col-client" onchange="showClientBalance()"><option value="">-- اختر العميل --</option></select>
    </div>
    <div id="client-balance-info" style="display:none;margin-bottom:14px;"></div>
    <div class="form-group"><label>المبلغ المحصل (جنيه)</label><input type="number" id="col-amount" placeholder="0.00" min="0" step="0.01"></div>
    <div class="form-group"><label>تاريخ التحصيل</label><input type="date" id="col-date"></div>
    <button class="btn btn-gold" onclick="applyCollection()">✅ تطبيق التحصيل (FIFO)</button>
  </div>
</div>

<!-- ══ DAILY REPORT ══ -->
<div class="panel" id="panel-report">
  <div class="report-header">
    <span class="today-label" id="report-today-lbl"></span>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <input type="date" id="report-date-filter" style="width:auto;padding:7px 10px;font-size:.82rem;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Cairo',sans-serif" onchange="renderReport()">
      <button class="btn btn-sm btn-outline" onclick="resetReportDate()" style="font-size:.78rem">📅 اليوم</button>
      <button class="btn btn-sm btn-outline" onclick="captureReport()">📸 صورة</button>
      <button class="btn btn-sm btn-green" onclick="exportReportExcel()">📊 Excel</button>
    </div>
  </div>
  <div id="report-snap">
    <div class="snap-header">
      <div>
        <div class="snap-title">📋 تحصيلات اليوم — فرع الوفاء</div>
        <div class="snap-subtitle" id="snap-date-lbl"></div>
      </div>
      <div style="font-size:.8rem;color:var(--muted)" id="snap-count-lbl"></div>
    </div>
    <div id="daily-report-body"></div>
  </div>
</div>

<!-- ══ ALL ══ -->
<div class="panel" id="panel-all">
  <div style="margin-bottom:14px;">
    <div style="font-weight:700;margin-bottom:10px;">كل الفواتير</div>
    <!-- CHECKBOX FILTERS -->
    <div class="check-filters" id="check-filters">
      <label class="check-label checked-all" id="chk-lbl-all">
        <input type="checkbox" id="chk-all" checked onchange="onChkAll()"> الكل
      </label>
      <label class="check-label" id="chk-lbl-unpaid">
        <input type="checkbox" id="chk-unpaid" onchange="onChkFilter()"> غير مسددة
      </label>
      <label class="check-label" id="chk-lbl-partial">
        <input type="checkbox" id="chk-partial" onchange="onChkFilter()"> جزئية
      </label>
      <label class="check-label" id="chk-lbl-paid">
        <input type="checkbox" id="chk-paid" onchange="onChkFilter()"> مسددة
      </label>
    </div>
    <div style="display:flex;justify-content:flex-left;gap:8px;">
      <button class="btn btn-sm btn-danger" onclick="clearAllData()">🗑 مسح الكل</button>
    </div>
  </div>
  <div id="all-invoices-body"></div>
</div>

<div id="toast"></div>

<!-- ══ POSTPONE POPUP ══ -->
<div class="postpone-overlay" id="postpone-overlay" onclick="closePostponeOutside(event)">
  <div class="postpone-box">
    <div class="postpone-title">⏳ تأجيل موعد التحصيل</div>
    <div class="postpone-client" id="pp-client-lbl"></div>
    <div class="postpone-tabs">
      <button class="p-tab active" onclick="switchPTab('days',this)">➕ أضف أيام</button>
      <button class="p-tab" onclick="switchPTab('date',this)">📅 تاريخ محدد</button>
    </div>
    <!-- أضف أيام -->
    <div class="p-section open" id="pp-days-section">
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <button class="btn btn-sm btn-outline" onclick="setDays(1)">+1</button>
        <button class="btn btn-sm btn-outline" onclick="setDays(2)">+2</button>
        <button class="btn btn-sm btn-outline" onclick="setDays(3)">+3</button>
        <button class="btn btn-sm btn-outline" onclick="setDays(5)">+5</button>
        <button class="btn btn-sm btn-outline" onclick="setDays(7)">+7</button>
        <button class="btn btn-sm btn-outline" onclick="setDays(10)">+10</button>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label>أو أدخل عدد الأيام يدوياً</label>
        <input type="number" id="pp-days-input" placeholder="عدد الأيام..." min="1" max="365" style="direction:ltr;text-align:right">
      </div>
    </div>
    <!-- تاريخ محدد -->
    <div class="p-section" id="pp-date-section">
      <div class="form-group" style="margin-bottom:14px">
        <label>اختر تاريخ التحصيل الجديد</label>
        <input type="date" id="pp-date-input">
      </div>
    </div>
    <div style="background:rgba(244,162,97,.08);border:1px solid rgba(244,162,97,.2);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:.82rem;color:var(--muted)">
      موعد التحصيل الحالي: <span id="pp-current-due" style="color:var(--gold);font-weight:700"></span>
      <br>موعد التحصيل الجديد: <span id="pp-new-due" style="color:var(--green);font-weight:700">—</span>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-gold" style="flex:1" onclick="applyPostpone()">✅ تأكيد التأجيل</button>
      <button class="btn btn-outline btn-sm" onclick="closePostpone()">إلغاء</button>
    </div>
  </div>
</div>

<!-- ══ CLIENT MODAL ══ -->
<div class="modal-overlay" id="client-modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-client-name">—</div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <!-- Stats for screen -->
    <div class="stats-grid" id="modal-stats"></div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <button class="btn btn-sm btn-outline" onclick="captureClientReport()">📸 صورة</button>
      <button class="btn btn-sm btn-green" onclick="exportClientExcel()">📊 Excel</button>
    </div>
    <!-- Snap area for screenshot (includes header) -->
    <div id="modal-snap">
      <!-- Hidden header shown only in screenshot via canvas -->
      <div id="modal-body"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
<script>
// ═══ DATA ═══
const SK='wafa_invoices_v1';
const CK='wafa_credits_v1'; // رصيد دائن per client
function load(){try{return JSON.parse(localStorage.getItem(SK))||[];}catch{return[];}}
function save(d){localStorage.setItem(SK,JSON.stringify(d));}
function loadCredits(){try{return JSON.parse(localStorage.getItem(CK))||{};}catch{return{};}}
function saveCredits(c){localStorage.setItem(CK,JSON.stringify(c));}
function getCredit(client){return loadCredits()[client]||0;}
function addCredit(client,amount,date){
  const c=loadCredits();
  if(!c[client])c[client]=0;
  c[client]=+(c[client]+amount).toFixed(2);
  // log it
  const logKey=CK+'_log';
  const log=JSON.parse(localStorage.getItem(logKey)||'[]');
  log.push({client,amount,date,type:'credit'});
  localStorage.setItem(logKey,JSON.stringify(log));
  saveCredits(c);
}
function useCredit(client,amount){
  const c=loadCredits();
  c[client]=+Math.max(0,(c[client]||0)-amount).toFixed(2);
  saveCredits(c);
}
function nextId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

// ═══ HELPERS ═══
function fmt(n){return Number(n||0).toLocaleString('ar-EG',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;}
function todayStr(){return new Date().toISOString().slice(0,10);}
function addDays(ds,n){const d=new Date(ds);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function statusLabel(inv){const p=inv.paid||0;if(p<=0)return['unpaid','غير مسددة'];if(p>=inv.amount)return['paid','مسددة'];return['partial','جزئية ('+fmt(p)+')'];}
function isOverdue(inv){return addDays(inv.date,6+(inv.dueOffset||0))<todayStr()&&(inv.paid||0)<inv.amount;}
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`show ${type}`;setTimeout(()=>{t.className='';},2800);}

// ═══ TABS ═══
function switchTab(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='report'){document.getElementById('report-date-filter').value=document.getElementById('report-date-filter').value||todayStr();renderReport();}
  if(name==='all')renderAll();
  if(name==='invoices'){renderInvStats();closeQP();}
  if(name==='collection')populateClientSelect();
}

// ═══ SEARCH ═══
let _st;
function doSearch(){clearTimeout(_st);_st=setTimeout(_doSearch,150);}
function _doSearch(){
  const q=document.getElementById('global-search').value.trim();
  const box=document.getElementById('search-results');
  if(!q){box.style.display='none';return;}
  const map={};
  load().forEach(inv=>{
    if(inv.client.includes(q)){
      if(!map[inv.client])map[inv.client]={count:0,due:0,overdue:false};
      map[inv.client].count++;map[inv.client].due+=Math.max(0,inv.amount-(inv.paid||0));
      if(isOverdue(inv))map[inv.client].overdue=true;
    }
  });
  const names=Object.keys(map);
  if(!names.length){box.innerHTML='<div class="search-item"><span style="color:var(--muted)">لا توجد نتائج</span></div>';box.style.display='block';return;}
  box.innerHTML=names.map(n=>`
    <div class="search-item" onmousedown="openClientModal('${esc(n)}')">
      <div>
        <div class="search-item-name">${n} ${map[n].overdue?'<span style="color:var(--red)">⚠️</span>':''}</div>
        <div class="search-item-meta">${map[n].count} فاتورة — متبقي: ${fmt(map[n].due)} جنيه</div>
      </div>
      <span style="color:var(--accent);font-size:.8rem">عرض ←</span>
    </div>`).join('');
  box.style.display='block';
}
function hideSearchDelay(){setTimeout(()=>{document.getElementById('search-results').style.display='none';},200);}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function closeModal(){document.getElementById('client-modal').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('client-modal'))closeModal();}

function renderModalBody(name){
  const invs=load().filter(i=>i.client===name).sort((a,b)=>a.date.localeCompare(b.date));
  const totAmt=invs.reduce((s,i)=>s+i.amount,0);
  const totPaid=invs.reduce((s,i)=>s+(i.paid||0),0);
  const totDue=totAmt-totPaid;
  const overdueCount=invs.filter(isOverdue).length;

  const credit=getCredit(name);
  document.getElementById('modal-stats').innerHTML=`
    <div class="stat-card" style="cursor:default">
      <div class="stat-value" style="color:var(--accent)">${invs.length}</div>
      <div class="stat-label">فواتير</div>
    </div>
    <div class="stat-card" style="cursor:default">
      <div class="stat-value" style="color:var(--green)">${fmt(totPaid)}</div>
      <div class="stat-label">محصّل (جنيه)</div>
    </div>
    <div class="stat-card" style="cursor:default">
      <div class="stat-value" style="color:${totDue>0?'var(--red)':'var(--green)'}">${fmt(totDue)}</div>
      <div class="stat-label">متبقي (جنيه)</div>
    </div>
    ${credit>0?`<div class="stat-card" style="cursor:default;border-color:rgba(46,204,113,.4);grid-column:1/-1">
      <div class="stat-value" style="color:var(--green);font-size:1.1rem">💳 ${fmt(credit)} جنيه</div>
      <div class="stat-label">رصيد دائن — يُخصم من الفاتورة القادمة</div>
    </div>`:''}`;


  if(!invs.length){document.getElementById('modal-body').innerHTML='<div class="empty"><div class="empty-icon">📂</div><div>لا توجد فواتير</div></div>';return;}

  // Build table — each invoice shows paid amount + collection dates
  const rows = invs.map(inv=>{
    const[cls,lbl]=statusLabel(inv);
    const dd=addDays(inv.date,6+(inv.dueOffset||0));
    const ov=isOverdue(inv);
    const paid=inv.paid||0;
    const rem=inv.amount-paid;
    const offset=inv.dueOffset||0;
    const colDates=(inv.collections||[]).map(c=>`${fmtDate(c.date)}: ${fmt(c.amount)} جنيه`).join(' | ');
    return`<tr>
      <td style="direction:ltr;text-align:right">${inv.number}</td>
      <td>${fmtDate(inv.date)}</td>
      <td style="color:${ov?'var(--red)':'var(--accent)'}">
        ${fmtDate(dd)}${ov?' ⚠️':''}
        ${offset>0?`<br><small style="color:var(--gold)">مؤجل +${offset} يوم</small>`:''}
      </td>
      <td>${fmt(inv.amount)}</td>
      <td>
        <div style="color:var(--green);font-weight:600">${fmt(paid)}</div>
        ${colDates?`<div class="col-dates">📅 ${colDates}</div>`:''}
      </td>
      <td style="color:var(--red);font-weight:700">${fmt(rem)}</td>
      <td><span class="status status-${cls}">${lbl}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('modal-body').innerHTML=`
    ${overdueCount>0?`<div style="background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:.85rem;color:#ff6b6b">⚠️ ${overdueCount} فاتورة متأخرة التحصيل</div>`:''}
    <div class="table-wrap"><table>
      <thead><tr><th>رقم الفاتورة</th><th>تاريخ الفاتورة</th><th>موعد التحصيل</th><th>المبلغ</th><th>المدفوع</th><th>المتبقي</th><th>الحالة</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr>
        <td colspan="3" style="color:var(--muted);font-weight:700">الإجمالي</td>
        <td style="font-weight:700">${fmt(totAmt)}</td>
        <td style="color:var(--green);font-weight:700">${fmt(totPaid)}</td>
        <td style="color:var(--red);font-weight:700">${fmt(totDue)}</td>
        <td></td>
      </tr></tfoot>
    </table></div>
    <div style="margin-top:12px;font-size:.75rem;color:var(--muted);text-align:center">محاسب الوفاء — ${fmtDate(todayStr())}</div>`;
}

// ── Client Excel
function exportClientExcel(){
  if(!modalClient)return;
  const invs=load().filter(i=>i.client===modalClient).sort((a,b)=>a.date.localeCompare(b.date));
  if(!invs.length)return showToast('لا توجد بيانات','error');
  const credit=getCredit(modalClient);
  const wb=XLSX.utils.book_new();
  const rows=[['رقم الفاتورة','تاريخ الفاتورة','موعد التحصيل','المبلغ','المدفوع','تواريخ التحصيل','المتبقي','الحالة']];
  invs.forEach(inv=>{
    const[,lbl]=statusLabel(inv);
    const colDates=(inv.collections||[]).map(c=>`${fmtDate(c.date)}: ${fmt(c.amount)}`).join(' | ');
    rows.push([inv.number,fmtDate(inv.date),fmtDate(addDays(inv.date,6)),inv.amount,inv.paid||0,colDates,inv.amount-(inv.paid||0),lbl]);
  });
  const tA=invs.reduce((s,i)=>s+i.amount,0),tP=invs.reduce((s,i)=>s+(i.paid||0),0);
  rows.push(['','','الإجمالي',tA,tP,'',tA-tP,'']);
  if(credit>0){
    rows.push(['','','','','','','','']);
    rows.push(['💳 رصيد دائن','','',credit,'','','يُخصم من الفاتورة القادمة','']);
  }
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:14},{wch:14},{wch:14},{wch:14},{wch:14},{wch:30},{wch:14},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws,modalClient.slice(0,30));
  XLSX.writeFile(wb,`تقرير_${modalClient}_${todayStr()}.xlsx`);
  showToast('✅ تم تحميل Excel');
}

      creditEl.innerHTML=`

  ctx.direction='rtl';ctx.textAlign='right';
  ctx.font='bold 26px Cairo,Arial';ctx.fillStyle='#fff';
  ctx.fillText('👤 '+modalClient,W-PX,44);
  ctx.font='15px Cairo,Arial';ctx.fillStyle='rgba(255,255,255,.75)';
  ctx.fillText('فرع الوفاء — تاريخ التقرير: '+fmtDate(todayStr()),W-PX,70);

  // Mini stats row
  const sw=(W-PX*2)/3;const sy=86;const sh=40;

    ctx.fillText(st[1],sx+(sw-8)/2,sy+16);
    ctx.font='11px Cairo,Arial';ctx.fillStyle='#8b949e';
    ctx.fillText(st[0],sx+(sw-8)/2,sy+32);
  });

  // Table
  const cols=['رقم الفاتورة','تاريخ الفاتورة','موعد التحصيل','المبلغ','المدفوع','المتبقي','الحالة'];
  const colW=(W-PX*2)/cols.length;
  let y=HEAD_H;
  ctx.fillStyle='#1c2330';ctx.fillRect(0,y,W,ROW_H);
  ctx.font='bold 12px Cairo,Arial';ctx.fillStyle='#8b949e';ctx.textAlign='right';ctx.direction='rtl';
  cols.forEach((c,i)=>ctx.fillText(c,W-PX-i*colW-colW/2,y+27));
  y+=ROW_H;

  invs.forEach((inv,ri)=>{
    ctx.fillStyle=ri%2===0?'#161b22':'#1a1f27';ctx.fillRect(0,y,W,ROW_H);

      else ctx.fillStyle='#e6edf3';
      ctx.fillText(v,W-PX-i*colW-colW/2,y+27);
    });
    y+=ROW_H;
  });

  // Footer
  ctx.fillStyle='#0d1117';ctx.fillRect(0,y,W,FOOT_H);
  ctx.font='12px Cairo,Arial';ctx.fillStyle='#8b949e';ctx.textAlign='center';
  ctx.fillText('محاسب الوفاء — '+fmtDate(todayStr()),W/2,y+30);

  const a=document.createElement('a');
  a.download=`تقرير_${modalClient}_${todayStr()}.png`;
  a.href=canvas.toDataURL('image/png');a.click();
  showToast('✅ تم تحميل الصورة');
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ═══ INVOICES ═══
function addInvoice(){
  const client=document.getElementById('inv-client').value.trim();
  const date=document.getElementById('inv-date').value;
  const amount=parseFloat(document.getElementById('inv-amount').value);
  const number=document.getElementById('inv-number').value.trim();
  if(!client)return showToast('⚠️ أدخل اسم العميل','error');
  if(!date)return showToast('⚠️ أدخل تاريخ الفاتورة','error');
  if(!amount||amount<=0)return showToast('⚠️ أدخل مبلغاً صحيحاً','error');
  const data=load();
  const newInv={id:nextId(),client,date,amount,number:number||`INV-${data.length+1}`,paid:0,collections:[],createdAt:Date.now()};

  // تحقق من رصيد دائن وطبّقه تلقائياً
  const credit=getCredit(client);
  if(credit>0){
    const apply=Math.min(credit,amount);
    newInv.paid=apply;
    newInv.collections.push({date:todayStr(),amount:apply,note:'رصيد دائن'});
    useCredit(client,apply);
    data.push(newInv);
    save(data);
    document.getElementById('inv-client').value='';
    document.getElementById('inv-amount').value='';
    document.getElementById('inv-number').value='';
    updateBadges();renderInvStats();updateDatalist();
    showToast(`✅ تم حفظ الفاتورة وخصم رصيد دائن ${fmt(apply)} جنيه تلقائياً`);
    return;
  }

  data.push(newInv);
  save(data);
  document.getElementById('inv-client').value='';
  document.getElementById('inv-amount').value='';
  document.getElementById('inv-number').value='';
  updateBadges();renderInvStats();updateDatalist();
  showToast(`✅ تم حفظ فاتورة ${client} — ${fmt(amount)} جنيه`);
}

function renderInvStats(){
  const data=load();
  const total=data.reduce((s,i)=>s+i.amount,0);
  const coll=data.reduce((s,i)=>s+(i.paid||0),0);
  const rem=total-coll;
  document.getElementById('inv-stats').innerHTML=`
    <div class="stat-card" onclick="showQP('invoices')">
      <div class="stat-value" style="color:var(--accent)">${data.length}</div>
      <div class="stat-label">إجمالي الفواتير</div>
    </div>
    <div class="stat-card" onclick="showQP('collected')" title="اضغط لعرض تحصيلات اليوم">
      <div class="stat-value" style="color:var(--green)">${fmt(coll)}</div>
      <div class="stat-label">المحصّل (جنيه) 👆</div>
    </div>
    <div class="stat-card" onclick="showQP('remaining')" title="اضغط لعرض الفواتير غير المسددة">
      <div class="stat-value" style="color:var(--red)">${fmt(rem)}</div>
      <div class="stat-label">المتبقي (جنيه) 👆</div>
    </div>`;
}

// QUICK PANELS
function closeQP(){
  document.getElementById('qp-collected').classList.remove('open');
  document.getElementById('qp-remaining').classList.remove('open');
}

function showQP(type){
  closeQP();
  if(type==='collected'){
    const data=load();
    // Group by date → then by client
    const dateMap={};
    data.forEach(inv=>{
      (inv.collections||[]).forEach(c=>{
        if(!dateMap[c.date])dateMap[c.date]={};
        if(!dateMap[c.date][inv.client])dateMap[c.date][inv.client]=0;
        dateMap[c.date][inv.client]+=c.amount;
      });
    });
    const dates=Object.keys(dateMap).sort((a,b)=>b.localeCompare(a)); // newest first
    let html='';
    if(!dates.length){
      html='<div class="empty" style="padding:20px"><div class="empty-icon">💭</div><div>لا توجد تحصيلات مسجلة</div></div>';
    }else{
      const grandTotal=dates.reduce((s,d)=>s+Object.values(dateMap[d]).reduce((a,b)=>a+b,0),0);
      html=dates.map(d=>{
        const clients=dateMap[d];
        const dayTotal=Object.values(clients).reduce((a,b)=>a+b,0);
        const rows=Object.entries(clients).sort((a,b)=>b[1]-a[1]).map(([cl,am])=>`

function populateClientSelect(){
  const data=load();

  // عملاء بفواتير مفتوحة أو رصيد دائن
  const set=new Set([
    ...data.filter(i=>(i.paid||0)<i.amount).map(i=>i.client),
    ...Object.keys(credits).filter(k=>credits[k]>0)
  ]);
  const clients=[...set].sort();
  const sel=document.getElementById('col-client');const cur=sel.value;
  sel.innerHTML='<option value="">-- اختر العميل --</option>'+clients.map(c=>{
    const cr=credits[c]||0;
    return`<option value="${c}" ${c===cur?'selected':''}>${c}${cr>0?' 💳':''}</option>`;
  }).join('');
  showClientBalance();
}
function showClientBalance(){
  const client=document.getElementById('col-client').value;
  const info=document.getElementById('client-balance-info');
  if(!client){info.style.display='none';return;}
  const invs=load().filter(i=>i.client===client&&(i.paid||0)<i.amount).sort((a,b)=>a.date.localeCompare(b.date));
  const credit=getCredit(client);
  if(!invs.length&&credit<=0){info.style.display='none';return;}
  const due=invs.reduce((s,i)=>s+(i.amount-(i.paid||0)),0);
  info.style.display='block';
  info.innerHTML=`<div class="client-invoices">
    ${credit>0?`<div style="background:rgba(46,204,113,.15);border:1px solid rgba(46,204,113,.3);border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:.85rem;color:var(--green);font-weight:700">💳 رصيد دائن: ${fmt(credit)} جنيه — سيُخصم تلقائياً من الفاتورة الجاية</div>`:''}
    ${invs.length?`<div style="font-size:.82rem;color:var(--muted);margin-bottom:8px;font-weight:700">فواتير مفتوحة (${invs.length}) — متبقي: <span style="color:var(--red)">${fmt(due)} جنيه</span></div>
    ${invs.map(i=>`<div class="client-row"><span>${fmtDate(i.date)} — ${i.number}</span><span style="color:var(--yellow)">${fmt(i.amount-(i.paid||0))} جنيه</span></div>`).join('')}`:''}
  </div>`;
}
function applyCollection(){
  const client=document.getElementById('col-client').value;
  let amount=parseFloat(document.getElementById('col-amount').value);
  const colDate=document.getElementById('col-date').value||todayStr();
  if(!client)return showToast('⚠️ اختر العميل','error');
  if(!amount||amount<=0)return showToast('⚠️ أدخل مبلغاً صحيحاً','error');

  let data=load();
  let totalAmount=amount;

  // استخدم الرصيد الدائن أولاً لو موجود
  const existingCredit=getCredit(client);
  if(existingCredit>0){
    const usedCredit=Math.min(existingCredit,amount);
    useCredit(client,usedCredit);
    // لا نضيفه لـ amount — هو موجود أصلاً في الفواتير من قبل
    showToast(`💳 تم استخدام رصيد دائن: ${fmt(usedCredit)} جنيه`);
  }

  const unpaid=data.filter(i=>i.client===client&&(i.paid||0)<i.amount).sort((a,b)=>a.date.localeCompare(b.date));

  // لو مفيش فواتير مفتوحة — المبلغ كله رصيد دائن
  if(!unpaid.length){
    addCredit(client,amount,colDate);
    save(data);
    document.getElementById('col-amount').value='';
    populateClientSelect();updateBadges();renderInvStats();
    showToast(`💳 تم حفظ ${fmt(amount)} جنيه كرصيد دائن للعميل`);
    showClientBalance();
    return;
  }

  let rem=amount,touched=0;
  for(const inv of unpaid){
    if(rem<=0)break;
    const due=inv.amount-(inv.paid||0);const apply=Math.min(rem,due);
    const idx=data.findIndex(i=>i.id===inv.id);
    data[idx].paid=(data[idx].paid||0)+apply;
    data[idx].collections.push({date:colDate,amount:apply});
    rem-=apply;touched++;
  }

  // لو في زيادة — احفظها كرصيد دائن
  if(rem>0){
    addCredit(client,rem,colDate);
    save(data);
    document.getElementById('col-amount').value='';
    populateClientSelect();updateBadges();renderInvStats();
    showToast(`✅ تم خصم ${fmt(amount-rem)} جنيه من ${touched} فاتورة`);
    setTimeout(()=>showToast(`💳 تم حفظ الزيادة ${fmt(rem)} جنيه كرصيد دائن للعميل`),1200);
  }else{
    save(data);
    document.getElementById('col-amount').value='';
    populateClientSelect();updateBadges();renderInvStats();
    showToast(`✅ تم خصم ${fmt(amount)} جنيه من ${touched} فاتورة`);
  }
  showClientBalance();
}

function previewNewDue(){
  if(!ppInvId)return;
  const data=load();
  const inv=data.find(i=>i.id===ppInvId);
  if(!inv)return;
  const currentOffset=inv.dueOffset||0;
  let newDue='';

    if(d>0)newDue=addDays(inv.date,6+currentOffset+d);
  }else{
    newDue=document.getElementById('pp-date-input').value;

document.addEventListener('input',e=>{

});

function applyPostpone(){
  if(!ppInvId)return;
  let data=load();
  const idx=data.findIndex(i=>i.id===ppInvId);
  if(idx===-1)return;
  const inv=data[idx];
  const currentOffset=inv.dueOffset||0;

  if(ppMode==='days'){
    const d=parseInt(document.getElementById('pp-days-input').value);
    if(!d||d<=0)return showToast('⚠️ أدخل عدد أيام صحيح','error');
    data[idx].dueOffset=(currentOffset+d);
    const newDue=addDays(inv.date,6+data[idx].dueOffset);
    save(data);
    closePostpone();
    renderReport();updateBadges();
    showToast(`✅ تم التأجيل — موعد التحصيل الجديد: ${fmtDate(newDue)}`);
  }else{
    const newDate=document.getElementById('pp-date-input').value;
    if(!newDate)return showToast('⚠️ اختر تاريخاً','error');
    if(newDate<=todayStr())return showToast('⚠️ التاريخ يجب أن يكون بعد اليوم','error');
    // احسب الـ offset من تاريخ الفاتورة الأصلي
    const baseDue=addDays(inv.date,6);
    const diffMs=new Date(newDate)-new Date(baseDue);
    const diffDays=Math.round(diffMs/864e5);
    data[idx].dueOffset=diffDays;
    save(data);
    closePostpone();
    renderReport();updateBadges();
    showToast(`✅ تم التأجيل — موعد التحصيل الجديد: ${fmtDate(newDate)}`);
  }
}

async function captureReport(){

  ctx.fillStyle=gr;ctx.fillRect(0,0,W,HEAD_H-20);
  ctx.font='bold 24px Cairo,Arial';ctx.fillStyle='#fff';ctx.textAlign='right';ctx.direction='rtl';
  ctx.fillText('التقرير اليومي — فرع الوفاء',W-PX,42);
  ctx.font='15px Cairo,Arial';ctx.fillStyle='rgba(255,255,255,.7)';
  ctx.fillText(`تاريخ: ${fmtDate(todayStr())}`,W-PX,70);
  const cols=['العميل','رقم الفاتورة','تاريخ الفاتورة','المبلغ','المتبقي','الحالة'];
  const colW=(W-PX*2)/cols.length;let y=HEAD_H;
  ctx.fillStyle='#1c2330';ctx.fillRect(0,y,W,ROW_H);
  ctx.font='bold 13px Cairo,Arial';ctx.fillStyle='#8b949e';
  cols.forEach((c,i)=>ctx.fillText(c,W-PX-i*colW-colW/2,y+27));y+=ROW_H;
  due.forEach((inv,ri)=>{
    ctx.fillStyle=ri%2===0?'#161b22':'#1a1f27';ctx.fillRect(0,y,W,ROW_H);

    vals.forEach((v,i)=>{ctx.fillStyle=i===4?'#e74c3c':'#e6edf3';ctx.fillText(v,W-PX-i*colW-colW/2,y+27);});
    y+=ROW_H;
  });
  ctx.fillStyle='#0d1117';ctx.fillRect(0,y,W,FOOT_H);
  ctx.font='12px Cairo,Arial';ctx.fillStyle='#8b949e';ctx.textAlign='center';
  ctx.fillText(`محاسب الوفاء — ${fmtDate(todayStr())}`,W/2,y+35);
  const a=document.createElement('a');a.download=`تقرير_يومي_${todayStr()}.png`;a.href=canvas.toDataURL('image/png');a.click();
  showToast('✅ تم تحميل الصورة');
}

  const overdue=load().filter(isOverdue).sort((a,b)=>a.date.localeCompare(b.date));
  const body=document.getElementById('overdue-body');
  if(!overdue.length){body.innerHTML='<div class="empty"><div class="empty-icon">✅</div><div>لا توجد فواتير متأخرة</div></div>';return;}
  const totDue=overdue.reduce((s,i)=>s+(i.amount-(i.paid||0)),0);
  const today=todayStr();
  body.innerHTML=`
    <div class="card" style="border-color:rgba(231,76,60,.3);margin-bottom:16px">
      <div class="stats-grid" style="margin-bottom:0">
        <div class="stat-card" style="cursor:default"><div class="stat-value" style="color:var(--red)">${overdue.length}</div><div class="stat-label">فاتورة متأخرة</div></div>
        <div class="stat-card" style="cursor:default"><div class="stat-value" style="color:var(--red)">${[...new Set(overdue.map(i=>i.client))].length}</div><div class="stat-label">عميل</div></div>
        <div class="stat-card" style="cursor:default"><div class="stat-value" style="color:var(--red)">${fmt(totDue)}</div><div class="stat-label">إجمالي المتأخر</div></div>
      </div>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>العميل</th><th>رقم الفاتورة</th><th>تاريخ الفاتورة</th><th>موعد التحصيل</th><th>تأخر (أيام)</th><th>المتبقي</th></tr></thead>
      <tbody>${overdue.map(inv=>{
        const dd=addDays(inv.date,6);
        const late=Math.floor((new Date(today)-new Date(dd))/864e5);
        return`<tr>
          <td><strong style="cursor:pointer;color:var(--accent)" onclick="openClientModal('${esc(inv.client)}')">${inv.client}</strong></td>
          <td style="direction:ltr;text-align:right">${inv.number}</td>
          <td>${fmtDate(inv.date)}</td>
          <td style="color:var(--red)">${fmtDate(dd)}</td>
          <td style="color:var(--red);font-weight:700;text-align:center">${late}</td>
          <td style="color:var(--red);font-weight:700">${fmt(inv.amount-(inv.paid||0))}</td>
        </tr>`;}).join('')}
      </tbody>
    </table></div>`;
}

// ═══ ALL — CHECKBOX FILTER ═══
function onChkAll(){
  const all=document.getElementById('chk-all').checked;
  ['unpaid','partial','paid'].forEach(k=>document.getElementById('chk-'+k).checked=false);
  if(!all)document.getElementById('chk-all').checked=true; // keep at least one
  updateChkStyles();renderAll();
}
function onChkFilter(){
  document.getElementById('chk-all').checked=false;
  // If none selected, revert to all
  const any=['unpaid','partial','paid'].some(k=>document.getElementById('chk-'+k).checked);
  if(!any)document.getElementById('chk-all').checked=true;
  updateChkStyles();renderAll();
}
function updateChkStyles(){
  const map={all:'checked-all',unpaid:'checked-unpaid',partial:'checked-partial',paid:'checked-paid'};
  Object.entries(map).forEach(([k,cls])=>{
    const lbl=document.getElementById('chk-lbl-'+k);
    lbl.classList.toggle(cls,document.getElementById('chk-'+k).checked);
  });
}
function getActiveFilters(){
  if(document.getElementById('chk-all').checked)return['unpaid','partial','paid'];
  return['unpaid','partial','paid'].filter(k=>document.getElementById('chk-'+k).checked);
}

function renderAll(){
  const filters=getActiveFilters();
  let data=load().sort((a,b)=>b.date.localeCompare(a.date));
  data=data.filter(inv=>{
    const p=inv.paid||0;
    if(p<=0&&filters.includes('unpaid'))return true;
    if(p>=inv.amount&&filters.includes('paid'))return true;
    if(p>0&&p<inv.amount&&filters.includes('partial'))return true;
    return false;
  });
  const body=document.getElementById('all-invoices-body');
  if(!data.length){body.innerHTML='<div class="empty"><div class="empty-icon">📂</div><div>لا توجد فواتير</div></div>';return;}
  body.innerHTML=`<div class="table-wrap"><table>
    <thead><tr><th>العميل</th><th>التاريخ</th><th>موعد التحصيل</th><th>المبلغ</th><th>المدفوع</th><th>الحالة</th><th></th></tr></thead>
    <tbody>${data.map(inv=>{
      const[cls,lbl]=statusLabel(inv);const dd=addDays(inv.date,6+(inv.dueOffset||0));const ov=isOverdue(inv);const offset=inv.dueOffset||0;
      return`<tr>
        <td><strong style="cursor:pointer;color:var(--accent)" onclick="openClientModal('${esc(inv.client)}')">${inv.client}</strong><br><small style="color:var(--muted)">${inv.number}</small></td>
        <td>${fmtDate(inv.date)}</td>
        <td style="color:${ov?'var(--red)':'var(--accent)'}">
          ${fmtDate(dd)}${ov?' ⚠️':''}
          ${offset>0?`<br><small style="color:var(--gold)">مؤجل +${offset}يوم</small>`:''}
        </td>
        <td>${fmt(inv.amount)}</td>
        <td style="color:var(--green)">${fmt(inv.paid||0)}</td>
        <td><span class="status status-${cls}">${lbl}</span></td>
        <td><button class="btn btn-sm btn-danger" onclick="deleteInvoice('${inv.id}')">🗑</button></td>
      </tr>`;}).join('')}
    </tbody></table></div>`;
}

function deleteInvoice(id){if(!confirm('حذف هذه الفاتورة؟'))return;save(load().filter(i=>i.id!==id));renderAll();updateBadges();showToast('تم الحذف');}
function clearAllData(){if(!confirm('⚠️ سيتم مسح جميع البيانات. هل أنت متأكد؟'))return;localStorage.removeItem(SK);localStorage.removeItem(CK);localStorage.removeItem(CK+'_log');renderAll();renderInvStats();updateBadges();showToast('تم مسح البيانات');}

// ═══ BADGES ═══
function updateBadges(){
  const today=todayStr(),data=load();
  const dc=data.filter(i=>addDays(i.date,6+(i.dueOffset||0))===today&&(i.paid||0)<i.amount).length;
  const oc=data.filter(isOverdue).length;
  const rb=document.getElementById('report-badge');
  const total=dc+oc;
  rb.textContent=total;rb.classList.toggle('show',total>0);
}

// ═══ INIT ═══
function init(){
  const today=new Date();
  document.getElementById('hdr-date').textContent=today.toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('inv-date').value=todayStr();
  document.getElementById('col-date').value=todayStr();
  document.getElementById('report-date-filter').value=todayStr();
  updateBadges();renderInvStats();updateDatalist();updateChkStyles();
}
init();
</script>
</body>
</html>
